<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Connexion</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e, #16213e, #0f3460);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }
        .login-box {
            background: white;
            padding: 40px;
            border-radius: 12px;
            width: 360px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
        .logo {
            text-align: center;
            font-size: 40px;
            margin-bottom: 10px;
        }
        h2 {
            text-align: center;
            color: #1a1a2e;
            margin-bottom: 8px;
            font-size: 20px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 25px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #444;
            font-size: 13px;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 11px 13px;
            margin-bottom: 16px;
            border: 1.5px solid #ddd;
            border-radius: 7px;
            font-size: 14px;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #0f3460;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #0f3460;
            color: white;
            border: none;
            border-radius: 7px;
            font-size: 15px;
            cursor: pointer;
            font-weight: bold;
            letter-spacing: 0.5px;
            transition: background 0.2s;
        }
        button:hover { background: #16213e; }
        .msg-error {
            background: #fdecea;
            color: #c0392b;
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 18px;
            font-size: 13px;
            text-align: center;
            border-left: 4px solid #e74c3c;
        }
        .msg-logout {
            background: #eafaf1;
            color: #27ae60;
            padding: 10px 14px;
            border-radius: 7px;
            margin-bottom: 18px;
            font-size: 13px;
            text-align: center;
            border-left: 4px solid #2ecc71;
        }
        .hint {
            margin-top: 22px;
            background: #f0f4ff;
            border-radius: 7px;
            padding: 12px 15px;
            font-size: 12px;
            color: #555;
        }
        .hint p { margin-bottom: 4px; }
        .db-badge {
            text-align: center;
            margin-top: 15px;
            font-size: 11px;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">🔐</div>
        <h2>Authentification</h2>
        <p class="subtitle">Authentification depuis MySQL + BCrypt</p>

        <div th:if="${param.error}" class="msg-error">
            ❌ Identifiants incorrects. Veuillez réessayer.
        </div>
        <div th:if="${param.logout}" class="msg-logout">
            ✅ Déconnexion réussie.
        </div>

        <form th:action="@{/login}" method="post">
            <label for="username">Nom d'utilisateur</label>
            <input type="text" id="username" name="username"
                   placeholder="Entrez votre identifiant" required />

            <label for="password">Mot de passe</label>
            <input type="password" id="password" name="password"
                   placeholder="Entrez votre mot de passe" required />

            <button type="submit">Se connecter</button>
        </form>

        <div class="hint">
            <p>👤 <strong>user</strong> / 1111 → Espace utilisateur</p>
            <p>🔑 <strong>admin</strong> / 1234 → Espace administrateur</p>
        </div>
        <p class="db-badge">🗄️ Utilisateurs chargés depuis MySQL</p>
    </div>
</body>
</html>
